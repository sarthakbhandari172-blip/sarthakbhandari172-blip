<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Sarthak Bhandari — AI command interface</title>
  <desc id="desc">A cinematic animated cyan command deck with a reactor core, diagnostics and developer identity.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#02050a"/><stop offset=".52" stop-color="#06111d"/><stop offset="1" stop-color="#02070c"/></linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#d7ffff"/><stop offset=".28" stop-color="#67f8ff"/><stop offset=".7" stop-color="#00a9d6"/><stop offset="1" stop-color="#056086"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#4ff7ff" stop-opacity="0"/><stop offset=".45" stop-color="#4ff7ff"/><stop offset="1" stop-color="#4ff7ff" stop-opacity="0"/></linearGradient>
    <radialGradient id="core"><stop stop-color="#fff"/><stop offset=".18" stop-color="#b8feff"/><stop offset=".48" stop-color="#1ce4f5"/><stop offset="1" stop-color="#006d95" stop-opacity="0"/></radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" fill="none" stroke="#65eefa" stroke-opacity=".045"/></pattern>
    <pattern id="micro" width="5" height="5" patternUnits="userSpaceOnUse"><path d="M0 0H5" stroke="#7ffaff" stroke-opacity=".035"/></pattern>
    <filter id="glow"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="blur"><feGaussianBlur stdDeviation="30"/></filter>
    <clipPath id="screen"><path d="M24 0H1176L1200 24V536L1176 560H24L0 536V24Z"/></clipPath>
  </defs>

  <path d="M24 0H1176L1200 24V536L1176 560H24L0 536V24Z" fill="url(#bg)"/>
  <g clip-path="url(#screen)">
    <rect width="1200" height="560" fill="url(#grid)"/>
    <rect width="1200" height="560" fill="url(#micro)"/>
    <ellipse cx="895" cy="280" rx="300" ry="280" fill="#00d9ff" opacity=".045" filter="url(#blur)"/>
    <path d="M0 70H370L396 44H720" fill="none" stroke="#54eff8" stroke-opacity=".22"/>
    <path d="M1200 480H855L828 507H480" fill="none" stroke="#54eff8" stroke-opacity=".18"/>
    <path d="M0 510H215L239 534H390M1200 43H1055L1034 20H870" fill="none" stroke="#54eff8" stroke-opacity=".28"/>
    <rect x="0" y="-100" width="1200" height="90" fill="url(#line)" opacity=".12">
      <animate attributeName="y" values="-100;650" dur="5.5s" repeatCount="indefinite"/>
    </rect>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <text x="54" y="48" fill="#74f8ff" font-size="12" letter-spacing="3">SB // PROFILE INTERFACE</text>
      <circle cx="1125" cy="43" r="5" fill="#71ffc3" filter="url(#glow)"><animate attributeName="opacity" values="1;.35;1" dur="2s" repeatCount="indefinite"/></circle>
      <text x="1141" y="48" fill="#8bbbc6" font-size="11" text-anchor="end">SYSTEM ONLINE</text>

      <text x="58" y="145" fill="#72f7ff" font-size="13" letter-spacing="5">TECH ENTHUSIAST // VIBE CODER</text>
      <text x="54" y="225" fill="#f0fbff" font-family="Arial, Helvetica, sans-serif" font-size="70" font-weight="800" letter-spacing="-2">SARTHAK</text>
      <text x="58" y="270" fill="url(#cyan)" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" letter-spacing="1">EVERY SYSTEM BEGINS AS A QUESTION.</text>
      <path d="M58 296H562" stroke="url(#line)" stroke-width="2"/>

      <g transform="translate(58 326)">
        <path d="M0 0H500L514 14V128H0Z" fill="#020810" fill-opacity=".68" stroke="#5aeef8" stroke-opacity=".22"/>
        <path d="M0 0H130" stroke="#67f8ff" stroke-width="2"/>
        <text x="18" y="27" fill="#588794" font-size="10" letter-spacing="2">IDENTITY</text>
        <text x="18" y="53" fill="#d9fbff" font-size="16" font-weight="700">SARTHAK BHANDARI</text>
        <text x="18" y="83" fill="#588794" font-size="10" letter-spacing="2">COUNTRY</text>
        <text x="18" y="108" fill="#70f8ff" font-size="14">NEPAL</text>
        <path d="M276 22V106" stroke="#5aeef8" stroke-opacity=".16"/>
        <text x="304" y="27" fill="#588794" font-size="10" letter-spacing="2">PROFILE</text>
        <rect x="304" y="41" width="174" height="27" rx="3" fill="#0b2e39" stroke="#54eef8" stroke-opacity=".38"/>
        <text x="391" y="59" fill="#d9fbff" font-size="10" text-anchor="middle" letter-spacing="1">TECH ENTHUSIAST</text>
        <rect x="304" y="78" width="174" height="27" rx="3" fill="#0b2e39" stroke="#54eef8" stroke-opacity=".38"/>
        <text x="391" y="96" fill="#70f8ff" font-size="10" text-anchor="middle" letter-spacing="2">VIBE CODER</text>
      </g>
      <text x="58" y="502" fill="#446f7b" font-size="10" letter-spacing="2">NEPAL // BUILDING IN PUBLIC</text>
    </g>

    <g transform="translate(890 282)">
      <circle r="205" fill="none" stroke="#3feaf5" stroke-opacity=".08"/>
      <circle r="189" fill="none" stroke="#67f8ff" stroke-opacity=".22" stroke-width="2" stroke-dasharray="2 15">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="35s" repeatCount="indefinite"/>
      </circle>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="22s" repeatCount="indefinite"/>
        <circle r="163" fill="none" stroke="#60f5ff" stroke-opacity=".3" stroke-width="4" stroke-dasharray="80 25 16 35"/>
        <path d="M0-176V-151M0 176V151M-176 0H-151M176 0H151" stroke="#8afaff" stroke-width="2"/>
      </g>
      <g>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="13s" repeatCount="indefinite"/>
        <circle r="130" fill="none" stroke="#7cfaff" stroke-opacity=".42" stroke-width="2" stroke-dasharray="9 7"/>
        <circle cx="0" cy="-130" r="5" fill="#dcffff" filter="url(#glow)"/>
      </g>
      <circle r="104" fill="#02131c" stroke="#65f6ff" stroke-width="2" stroke-opacity=".65"/>
      <path d="M0-87 75-43 75 43 0 87-75 43-75-43Z" fill="none" stroke="#72f8ff" stroke-width="3" filter="url(#glow)"/>
      <path d="M0-63 55-32 55 32 0 63-55 32-55-32Z" fill="#0b4053" fill-opacity=".5" stroke="#c6feff" stroke-width="2"/>
      <circle r="43" fill="url(#core)" opacity=".95" filter="url(#glow)">
        <animate attributeName="r" values="39;46;39" dur="2.8s" repeatCount="indefinite"/>
      </circle>
      <circle r="17" fill="#fff"/>
      <g fill="#73f8ff" font-family="monospace" font-size="10" letter-spacing="2">
        <text x="-205" y="-115">TECH</text><text x="130" y="-115">CODE</text><text x="142" y="126">NEPAL</text>
      </g>
      <path d="M-202-101H-126M127-101H196M139 110H202" stroke="#66f5ff" stroke-opacity=".45"/>
    </g>
  </g>
  <path d="M24 1H1176L1199 24V536L1176 559H24L1 536V24Z" fill="none" stroke="#68f7ff" stroke-opacity=".38"/>
  <path d="M1 94V24L24 1H105M1199 466V536L1176 559H1095" fill="none" stroke="#9cfbff" stroke-width="2"/>
</svg>
